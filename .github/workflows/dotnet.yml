name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./HelloWorld.sln

      - name: Build
        run: dotnet build ./HelloWorld.sln --configuration Release --no-restore

      - name: Run application
        run: dotnet run --project ./src/HelloWorld.ConsoleApp/HelloWorld.ConsoleApp.csproj --configuration Release --no-build
